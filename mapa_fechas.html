<script>
function generarNumero() {
  // GENERA EL AÑO, EL PRIMER NÚMERO EN AZUL ES LA SUMA DE LOS AÑOS ANTES Y DESPUES DE CRISTO, EL SEGUNDO ES LOS AÑOS ANTES DE CRISTO.
  const num = Math.floor(Math.random() * 5426) - 3400;
  document.getElementById("numero").innerText = "Número: " + num;
}

function generarCoordenadas() {
  const lat = Math.random() * 180 - 90;
  const lon = Math.random() * 360 - 180;

  document.getElementById("coordenadas").innerText =
    `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`;

  colocarPunto(lat, lon);
}

function colocarPunto(lat, lon) {
  const img = document.getElementById("imagenMapa");
  const punto = document.getElementById("punto");

  const width = img.clientWidth;
  const height = img.clientHeight;

  const x = (lon + 180) * (width / 360);
  const y = (90 - lat) * (height / 180);

  punto.style.left = x + "px";
  punto.style.top = y + "px";
  punto.style.display = "block";
}

function hacerTodo() {
  generarNumero();
  generarCoordenadas();
}
</script>
